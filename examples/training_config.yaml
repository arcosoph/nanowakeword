# ==========================================================
#       NanoWakeWord Training Configuration
# ==========================================================
# This file controls the entire training pipeline.
# Parameters are grouped logically for clarity and ease of use.
# ==========================================================

# ⚠️ FULL config Explanation: https://arcosoph.com/blog/nanowakeword_config_guide
# 😄 Please read our comment & change your required before starting this section.

model_name: "arcosoph_A_v1"  # ⚠️ Change this name when creating a new model (e.g., arcosoph_A_v2)
output_dir: "./trained_models"

positive_data_path: "./data/positive"
negative_data_path: "./data/negative"

background_paths: ["SonicWeave-v2/part1",
                   "SonicWeave-v2/part2",
                   "SonicWeave-v2/part3"
                  ] # ⚠️ Download from here: https://huggingface.co/datasets/arcosoph/SonicWeave-v2

rir_paths: ["rir"] # https://huggingface.co/datasets/davidscripka/MIT_environmental_impulse_responses

# ============================================================
# Model Architecture
# ============================================================
model_type: "dnn" # You can try other architectures. Fast Time `DNN` is recommended.
layer_size: 32    # You can increase it further to get better results (e.g., 64, 128)
n_blocks: 3       # You can increase it further to get better results (e.g., 4, 6)
embedding_dim: 128  
dropout_prob: 0.3  
activation_function: "relu"

# ============================================================
# Loss Function
# ============================================================

margin_pos: 2.0       # Positives must score > sigmoid(2.0) ≈ 0.88
margin_neg: -2.0      # Negatives must score < sigmoid(-2.0) ≈ 0.12

LOSS_BIAS: 0.65

# Tighter logit regularization to prevent saturation
logit_reg_weight: 0.0005
logit_reg_margin: 4.0  
logit_min_margin: 1.5  

# ============================================================
# Training Settings
# ============================================================
steps: 50000  # Traning steps
stabilization_steps: 20000 # After how many steps will validation be activated?  (⚠️: stabilization_steps < steps)

optimizer_type: "adamw"
learning_rate_max: 0.0008  
lr_scheduler_type: "onecycle"
weight_decay: 0.01
momentum: 0.9
num_workers: 0

# ============================================================
# Batch Composition
# ============================================================
batch_composition:
  t: 50
  b: 90
  hn: 20      
  n: 100
  AE28H_float32: 100
  # oww: 1000
  # and others

# ============================================================
# Feature Manifest
# ============================================================

feature_manifest:
  targets:
    t: "./trained_models/arcosoph_A_v1/features/positive_features.npy"

  negatives:
    AE28H_float32: "AE29H_float32.npy" # Download from here: https://huggingface.co/datasets/arcosoph/AE29H_float32
    b: "RACON_11h_v1.npy"                  # background/ambient noise
    n: "./trained_models/arcosoph_A_v1/features/negative_features.npy"
    hn: "./trained_models/arcosoph_A_v1/features/hard_negative_features.npy"
    # oww: ./openwakeword_features_ACAV100M_2000_hrs_16bit.npy # Here: https://huggingface.co/datasets/davidscripka/openwakeword_features
    # and others

  targets_val:
    t_v: './trained_models/arcosoph_A_v1/features/positive_features_val.npy'

  negatives_val:
    bv: "RACON_11h_v1.npy" # Download from here: https://huggingface.co/datasets/arcosoph/RACON_11h_v1


## Synthetic Data Generation
target_phrase: "hello arcosoph" # ⚠️ your wake word

data_generation_tasks:

  # ===============================
  # 1️ Positive wake word samples
  # ===============================
  - name: "any name like pos_data"
    enabled: true
    output_dir: "data/positive"
    num_samples: 2500
    file_prefix: "pos"

    text_source:
      type: "fixed_phrase"
      phrase: "hello arcosoph" # ⚠️ your wake word


  - name: "pos_val"
    enabled: true
    output_dir: "data/positive_val"
    num_samples: 2000
    file_prefix: "pos"

    text_source:
      type: "fixed_phrase"
      phrase: "hello arcosoph"    # ⚠️ your wake word


  # ===============================
  # 2️ Word-based adversarial negatives
  # ===============================
  - name: "Adversarial Negatives"
    enabled: true
    output_dir: "data/negative"
    num_samples: 5000
    file_prefix: "neg_auto"

    text_source:
      type: "auto_adversarial"
      base_phrase: "hello arcosoph"  # ⚠️ your wake word
      include_input_words: true
      include_partial_phrase: true
      multi_word_prob: 0.5
      max_multi_word_len: 3


  # ===============================
  # 3️ Phoneme adversarial negatives
  # ===============================
  - name: "Phoneme Hard Negatives"
    enabled: true
    output_dir: "data/negative_phoneme"
    num_samples: 3000
    file_prefix: "neg_ph"

    text_source:
      type: "phoneme_adversarial"
      base_phrase: "hello arcosoph"   # ⚠️ your wake word
      min_distance: 0.3


  # ===============================
  # 4️ Custom negative phrases
  # ===============================
  - name: "Custom Negatives"
    enabled: true
    output_dir: "data/negative"
    num_samples: 50
    file_prefix: "neg_custom"

    text_source:
      type: "from_list"
      phrases:                  # ⚠️ Use your own negative words if necessary
        - "arcosoph eloo"
        - "arcosop"
        - "hie arcosoph"
        - "arkhoshap"
        - "yarkasop"

      repeat_each: 10


# ============================================================
# Augmentation
# ============================================================
augmentation_batch_size: 16
feature_gen_cpu_ratio: 1.0

augmentation_settings:
  gain_prob: 1.0
  max_gain_in_db: 2.0
  max_pitch_semitones: 1.0
  max_snr_in_db: 35.0
  min_gain_in_db: -2.0
  min_pitch_semitones: -1.0
  min_snr_in_db: 15.0
  pitch_prob: 0.3
  rir_prob: 0.0


feature_generation_manifest:
  # you can create more feature 

  jast_a_name_like_pos_feature:
    input_audio_dirs: ["./data/positive"]
    output_filename: "positive_features.npy"
    use_background_noise: true
    use_rir: false
    
    augmentation_rounds: 10
    # augmentation_settings: (we will use default)

  pos_val_feature:
    input_audio_dirs: ["./data/positive_val"]
    output_filename: "positive_features_val.npy"
    use_background_noise: true
    use_rir: false
    
    augmentation_rounds: 10
    # augmentation_settings: (we will use default)

  negatives_1:
    input_audio_dirs: ["./data/negative"]
    output_filename: "negative_features.npy"
    use_background_noise: true
    use_rir: false

    augmentation_rounds: 10
  
  negatives_2:
    input_audio_dirs: ["./data/negative_phoneme"]
    output_filename: "hard_negative_features.npy"
    use_background_noise: true
    use_rir: false

    augmentation_rounds: 1
  
  # pure_ambient_noise:
  #   input_audio_dirs: ["./data/noise"]
  #   output_filename: "pure_noise_features.npy"
  #   use_background_noise: false

  #   augmentation_rounds: 3
  #   augmentation_settings: 
  #       PitchShift: 0.6
  #       Gain: 1.0
  #       RIR: 0.5
  
  # and others if you want to genarete...


background_paths_duplication_rate:
  - 1

# ============================================================
# Validation Settings
# ============================================================
# Penalize misses 4x more than false alarms during validation
val_miss_weight: 4.0
val_fp_weight: 1.0
validation_batch_size: 256
validation_smoothing_window: 3
val_early_stopping_patience: 5000

# ============================================================
# Curriculum Learning
# ============================================================
hardness_ema_alpha: 0.05
hardness_floor: 0.05
hardness_reset_interval: 5000
hardness_reset_decay: 0.5
checkpoint_averaging_top_k: 5

# ============================================================
# Checkpointing & Debug
# ============================================================
checkpointing:
  enabled: true
  interval_steps: 1000
  limit: 2

early_stopping_patience: 0
min_delta: 0.0001
ema_alpha: 0.01

onnx_opset_version: 17
show_training_summary: true
debug_mode: true

# ============================================================
# Pipeline Control
# ============================================================
transform_clips: true # ⚠️ Don't forget to turn it off after finished.
generate_clips: true  # ⚠️ Don't forget to turn it off after finished.
train_model: true
overwrite: false
